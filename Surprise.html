<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Pallavi</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
      margin: 0;
      padding: 0;
      animation: fadeIn 2s ease; /* 👈 Smooth transition */
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

  <meta charset="UTF-8">
  <title>Surprise</title>
  <style>
    body { background: #ffdde1; text-align: center; font-family: Arial; }
    h1 { color: #ff3f6c; }
    #countdown { font-size: 2em; margin-top: 20px; }
  </style>
  <script>
    const targetDate = new Date("May 2, 2026 00:00:00").getTime();
    const countdown = setInterval(() => {
      const now = new Date().getTime();
      const distance = targetDate - now;
      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
      const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
      const seconds = Math.floor((distance % (1000*60))/1000);
      document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
      if (distance < 0) {
        clearInterval(countdown);
        document.getElementById("countdown").innerHTML = "🎉 Happy Birthday Pallavi! 🎉";
      }
    }, 1000);
  </script>
</head>
<body>
  <h1>🎁 A Special Surprise Awaits 🎁</h1>
  <div id="countdown"></div>
  <p><a href="index.html">⬅ Back to Home</a></p>
</body>
</html>
