<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday My Love</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 50px;
    }
    h1 {
      font-size: 3em;
      color: #fff;
    }
    .message {
      font-size: 1.5em;
      margin: 20px auto;
      max-width: 600px;
      background: rgba(255,255,255,0.8);
      padding: 20px;
      border-radius: 10px;
    }
    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 1em;
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎉 Happy Birthday, My Love 🎉</h1>
  </header>

  <div class="message">
    <p>Dear [Pallavi],</p>
    <p>You make my world brighter every single day.  
    On your special day, I just want to remind you how much you mean to me.  
    This little website is my way of saying: You are my everything ❤️</p>
  </div>

  <div class="gallery">
    <img src="photo1.jpg" alt="Memory 1">
    <img src="photo2.jpg" alt="Memory 2">
    <img src="photo3.jpg" alt="Memory 3">
  </div>

  <footer>
    Made with love by Ankush 💕
  </footer>
</body>
</html>
